<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Contact</title>

    <link rel="icon" href="./6284034.png" type="image/x-icon" />
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="stylesheet" type="" href="theme.css" />
    <link rel="stylesheet" type="" href="contact.css" />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css"
    />
  </head>
  <body>

    <div class="container col-xl-10 col-xxl-8 px-4 py-5">
      <div class="row align-items-center g-lg-5 py-5">
        <div class="col-lg-7 text-center text-lg-start" style="margin-bottom: 100px;">
          <h1 class="display-4 fw-bold lh-1 text-body-emphasis mb-3 text-warning">
            Feel free to reach out!
          </h1></>
          <p class=" fw-bold lh-1 text-body-emphasis mb-3">
            Have something to share? Fill out the form below and drop me a message. 
            I'll get back to you as soon as possible. 
            Your thoughts and inquiries are valuable to me, and I'm eager to connect with you. 
            Let's start a conversation!
          </p>
        </div>
        <div class="col-md-8 mx-auto col-lg-4">
          <div class="card shadow text-center" style="max-height: 720px; margin-top: -50px;">
              <div class="card-body">
                  <div class="mx-auto" style="width: 150px; height: 150px;">
                      <dotlottie-player
                          src="https://lottie.host/d5a4e17c-f552-4920-b772-938c00d370c3/Jt7tL1srCm.json"
                          background="transparent"
                          speed="1"
                          loop
                          autoplay
                      ></dotlottie-player>
                  </div>
                  <h5 class="card-title">Contact Me</h5>
                  <hr />
                  <form id="my-form" action="https://formspree.io/f/meqwejjz" method="POST">
                      <div class="mb-3 text-left">
                          <label class="ani" for="name">Name:</label>
                          <input
                              type="text"
                              class="form-control goal"
                              id="name"
                              name="name"
                              placeholder="Name"
                              required
                          />
                      </div>
                      <div class="mb-3 text-left">
                          <label class="ani" for="email">Email:</label>
                          <input
                              type="email"
                              class="form-control goal"
                              id="email"
                              name="email"
                              placeholder="Email"
                              required
                          />
                      </div>
                      <div class="mb-3 text-left">
                          <label class="ani" for="message">Message:</label>
                          <textarea
                              class="form-control goal"
                              rows="3"
                              id="message"
                              name="message"
                              placeholder="Type your message here"
                              required
                          ></textarea>
                      </div>
                      <button
                          class="btn btn-primary btn-block"
                          id="my-form-button"
                          type="submit"
                      >
                          Submit
                      </button>
                      <br />
                      <p id="my-form-status"></p>
                  </form>
              </div>
          </div>
      </div>
      
            </div>
          </div>
        </div>
      </div>
    </div>

    <br />
    <br />

    <script
      src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs"
      type="module"
    ></script>

    <script src="theme.js"></script>
    <script src="contact.js"></script>
    <script src="https://unpkg.com/scrollreveal@4.0.7/dist/scrollreveal.min.js"></script>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script
      src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
      integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
